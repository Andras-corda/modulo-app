<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src *;">
  <title>Modulo</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&family=Roboto:wght@400;500&family=Roboto+Mono:wght@400&display=swap" rel="stylesheet">

  <!-- Anti-FOUC : appliquer le thème avant le premier paint -->
  <script>
    // Lire le thème depuis le store Electron de façon synchrone si possible
    // Sinon garder dark par défaut — sera corrigé par bootstrap()
    try {
      const raw = window.__MODULO_THEME__;
      if (raw) document.documentElement.setAttribute('data-theme', raw);
    } catch(e) {}
  </script>

  <!-- CSS -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>

  <!-- ── Titlebar ── -->
  <div id="titlebar">
    <div id="titlebar-logo">
      <!-- Logo Modulo -->
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <rect x="2" y="2" width="7" height="7" rx="2" fill="#4285F4"/>
        <rect x="11" y="2" width="7" height="7" rx="2" fill="#4285F4" opacity=".6"/>
        <rect x="2" y="11" width="7" height="7" rx="2" fill="#4285F4" opacity=".6"/>
        <rect x="11" y="11" width="7" height="7" rx="2" fill="#4285F4" opacity=".3"/>
      </svg>
      <span>Modulo</span>
    </div>

    <div id="titlebar-title">v1.5.1</div>

    <div id="window-controls">
      <button class="wc-btn" id="btn-minimize" title="Réduire">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><rect y="5.5" width="12" height="1"/></svg>
      </button>
      <button class="wc-btn" id="btn-maximize" title="Agrandir">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="1" y="1" width="10" height="10" rx="1"/></svg>
      </button>
      <button class="wc-btn close" id="btn-close" title="Fermer">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>

  <!-- ── Sidebar ── -->
  <nav id="sidebar">
    <div id="sidebar-nav">

      <!-- Section fixe : toujours visible -->
      <div class="nav-section">Principal</div>
      <div class="nav-item active" data-key="dashboard">
        <span class="nav-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/>
          </svg>
        </span>
        <span class="nav-label" data-i18n="dashboard">Dashboard</span>
        <span class="nav-tooltip" data-i18n="dashboard">Dashboard</span>
      </div>
      <div class="nav-item" data-key="marketplace">
        <span class="nav-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/>
          </svg>
        </span>
        <span class="nav-label" data-i18n="marketplace">Marketplace</span>
        <span class="nav-tooltip" data-i18n="marketplace">Marketplace</span>
      </div>

      <!-- Section modules installés -->
      <div class="nav-section">Modules</div>
      <div id="modules-nav">
        <!-- Rempli dynamiquement par rebuildNav() -->
      </div>

      <!-- Séparateur bas -->
      <div style="flex:1"></div>
    </div>

    <!-- Section basse : Profil + Paramètres -->
    <div style="border-top:1px solid var(--border);padding:8px 0">
      <!-- Profil utilisateur bas sidebar -->
      <div class="nav-item nav-profile-item" data-key="profile" id="sidebar-profile-btn">
        <span class="nav-icon" id="sidebar-avatar" style="width:28px;height:28px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#fff;flex-shrink:0;overflow:hidden">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </span>
        <span class="nav-label" id="sidebar-username" style="font-size:12px;font-weight:500">Profil</span>
        <span class="nav-tooltip">Profil</span>
      </div>
      <div class="nav-item" data-key="themes">
        <span class="nav-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
          </svg>
        </span>
        <span class="nav-label" data-i18n="themes">Thèmes</span>
        <span class="nav-tooltip" data-i18n="themes">Thèmes</span>
      </div>
      <div class="nav-item" data-key="settings">
        <span class="nav-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </span>
        <span class="nav-label" data-i18n="settings">Paramètres</span>
        <span class="nav-tooltip" data-i18n="settings">Paramètres</span>
      </div>
    </div>

    <!-- Chevron collapse -->
    <div id="sidebar-chevron-wrap">
      <div id="sidebar-chevron" title="Réduire la barre">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </div>
    </div>
  </nav>

  <!-- ── Main content ── -->
  <main id="app-content"></main>

  <!-- ── Timer overlay ── -->
  <div id="timer-overlay"></div>

  <!-- ── Modal ── -->
  <div id="modal-overlay" class="hidden">
    <div class="modal">
      <div class="modal-header">
        <span></span>
        <button class="btn btn-ghost btn-icon btn-sm modal-close-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary modal-cancel">Annuler</button>
        <button class="btn btn-primary modal-confirm">Confirmer</button>
      </div>
    </div>
  </div>

  <!-- ── Scripts — ordre strict ── -->

  <!-- 1. Icônes (requis en premier, icon() utilisé partout) -->
  <script src="js/icons.js"></script>

  <!-- 2. i18n (t() utilisé partout) -->
  <script src="js/i18n.js"></script>

  <!-- 3. Store renderer -->
  <script src="js/store.js"></script>

  <!-- 4. Router -->
  <script src="js/router.js"></script>

  <!-- 5. Modules core (DevLog, Modal, Sound, TimerOverlay, utils, ModuleLoader, ModuleManager) -->
  <script src="js/modules.js"></script>

  <!-- 6. Pages fixes -->
  <script src="pages/marketplace.js"></script>
  <script src="pages/settings.js"></script>
  <script src="pages/themes.js"></script>
  <script src="pages/dashboard.js"></script>
  <script src="pages/profile.js"></script>

  <!-- 7. Bootstrap (doit être en dernier) -->
  <script src="js/app.js"></script>

</body>
</html>
